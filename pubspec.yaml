name: subscription_tracker
description: "Subscription Tracker - Gerenciador de assinaturas mensais com BDD e CI/CD."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado reativo simples e testável
  provider: ^6.1.2

  # Geração de IDs únicos (UUID v4) para as assinaturas
  uuid: ^4.4.2

  # Formatação de moeda e números (pt_BR)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linter oficial da equipe Flutter para manter qualidade de código
  flutter_lints: ^4.0.0

  # Framework de BDD para Dart — permite escrever testes em linguagem Gherkin
  bdd_widget_test: ^1.6.1

  # Cobertura de código — gera relatório lcov.info
  coverage: ^1.8.0

flutter:
  uses-material-design: true
